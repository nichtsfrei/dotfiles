outputs = "All"
[modules]
left = [ ["Workspaces", "KeyboardLayout"] ]
center = [ "MediaPlayer", "Clock" ]
right = [ ["SystemInfo",  "Privacy", "Tray", "Settings" ] ]

[window_title]
mode = "Class"
truncate_title_after_length = 75

[keyboard_layout.labels]
"English (US)" = "US"

[clock]
format = "%F %R"

[appearance]
style = "Solid"

[appearance.background_color]
base = "#000000"

[appearance.text_color]
base = "#f5e3f7"
